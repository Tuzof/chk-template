name: CHK Runner

on:
  workflow_dispatch:
    inputs:
      target_list:
        description: 'Lista de targets (um por linha: card|mes|ano|cvv)'
        required: true
        type: string
      threads:
        description: 'Threads paralelas'
        required: false
        default: '10'
        type: string
      saldo:
        description: 'Verificar saldo (não implementado)'
        required: false
        default: 'false'
        type: boolean

jobs:
  chk:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Prepare targets file
        run: |
          echo "${{ github.event.inputs.target_list }}" > targets.txt
          echo "Targets carregados: $(wc -l < targets.txt)"

      - name: Run CHK
        env:
          THREADS: ${{ github.event.inputs.threads }}
          WEBHOOK_PROXY: ${{ secrets.WEBHOOK_PROXY }}
          CIELO_KEYS: ${{ secrets.CIELO_KEYS }}
        run: |
          python chk.py -t targets.txt -th $THREADS -o results.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: chk-results
          path: |
            results.txt
            *.html
            *.log
          retention-days: 7

      - name: Show summary
        run: |
          echo "## CHK Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Targets:** $(wc -l < targets.txt)" >> $GITHUB_STEP_SUMMARY
          echo "**Threads:** ${{ github.event.inputs.threads }}" >> $GITHUB_STEP_SUMMARY
          if [ -f results.txt ]; then
            LIVE=$(grep -c "LIVE" results.txt || echo 0)
            DIE=$(grep -c "DIE" results.txt || echo 0)
            ERROR=$(grep -c "ERROR" results.txt || echo 0)
            echo "**LIVE:** $LIVE" >> $GITHUB_STEP_SUMMARY
            echo "**DIE:** $DIE" >> $GITHUB_STEP_SUMMARY
            echo "**ERROR:** $ERROR" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**LIVE details:**" >> $GITHUB_STEP_SUMMARY
            grep "LIVE" results.txt | head -20 >> $GITHUB_STEP_SUMMARY || echo "Nenhuma LIVE" >> $GITHUB_STEP_SUMMARY
          fi
